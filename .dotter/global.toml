# Dotfiles — Dotter Package Definitions
# Each [package.files] section maps repo paths to deploy targets.
# Activate packages per-machine in local.toml.

# ── Base packages (expected on every machine) ───────────────────

[home.files]
"home/.zshenv" = "~/.zshenv"
"home/.profile" = "~/.profile"
"home/.editorconfig" = "~/.editorconfig"

[zsh.files]
"zsh/.zshenv" = "~/.config/zsh/.zshenv"
"zsh/.zshrc" = "~/.config/zsh/.zshrc"
"zsh/.zsh_plugins.txt" = "~/.config/zsh/.zsh_plugins.txt"
"zsh/conf.d/" = "~/.config/zsh/conf.d/"
"zsh/functions/" = "~/.config/zsh/functions/"


[starship.files]
"starship/starship.toml" = "~/.config/starship.toml"

[git.files]
"git" = "~/.config/git"

[nvim.files]
"nvim" = "~/.config/nvim"

[lsd.files]
"lsd/config.yml" = "~/.config/lsd/config.yml"
"lsd/colors.yml" = "~/.config/lsd/colors.yml"

# ── Desktop packages (graphical environment) ────────────────────

[qtile.files]
"qtile" = "~/.config/qtile"

[i3.files]
"i3" = "~/.config/i3"

[gtk-3.files]
"gtk-3" = "~/.config/gtk-3.0"

[wezterm.files]
"wezterm/wezterm.lua" = "~/.config/wezterm/wezterm.lua"
"wezterm/stylua.toml" = "~/.config/wezterm/stylua.toml"
"wezterm/config/init.lua" = "~/.config/wezterm/config/init.lua"
"wezterm/config/theme.lua" = "~/.config/wezterm/config/theme.lua"
"wezterm/config/font.lua" = "~/.config/wezterm/config/font.lua"

[rofi.files]
"rofi" = "~/.config/rofi"

[dunst.files]
"dunst" = "~/.config/dunst"

[xdg.files]
"xdg/user-dirs.dirs" = "~/.config/user-dirs.dirs"
"xdg/user-dirs.locale" = "~/.config/user-dirs.locale"
"xdg/desktop/.gitkeep" = "~/desktop/.gitkeep"
"xdg/documents/.gitkeep" = "~/documents/.gitkeep"
"xdg/downloads/.gitkeep" = "~/downloads/.gitkeep"
"xdg/music/.gitkeep" = "~/music/.gitkeep"
"xdg/pictures/.gitkeep" = "~/pictures/.gitkeep"
"xdg/public/.gitkeep" = "~/public/.gitkeep"
"xdg/templates/.gitkeep" = "~/templates/.gitkeep"
"xdg/videos/.gitkeep" = "~/videos/.gitkeep"

# ── Machine-specific packages ───────────────────────────────────

[scripts.files]
"bin/set-monitors" = "~/bin/set-monitors"

# ── Default variables (available in handlebars templates) ────────

[default.variables]
theme = "catppuccin-macchiato"

