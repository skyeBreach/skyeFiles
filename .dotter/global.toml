# ==================================================================================================================== #
# Window Manager

[i3.files]
"i3/config" = "~/.config/i3/config"
"i3/betterlockscreenrc" = "~/.config/betterlockscreen/betterlockscreenrc"
"i3/wallpapers" = "~/.config/betterlockscreen/wallpapers"

[rofi.files]
"rofi" = "~/.config/rofi"

[dunst.files]
"dunst" = "~/.config/dunst"

# ==================================================================================================================== #
# Desktop Utilities

[gtk-3.files]
"gtk-3" = "~/.config/gtk-3.0"

[xdg.files]
"xdg/user-dirs.dirs" = "~/.config/user-dirs.dirs"
"xdg/user-dirs.locale" = "~/.config/user-dirs.locale"
"xdg/mimeapps.list" = "~/.config/mimeapps.list"
"xdg/desktop/.gitkeep" = "~/desktop/.gitkeep"
"xdg/documents/.gitkeep" = "~/documents/.gitkeep"
"xdg/downloads/.gitkeep" = "~/downloads/.gitkeep"
"xdg/music/.gitkeep" = "~/music/.gitkeep"
"xdg/pictures/.gitkeep" = "~/pictures/.gitkeep"
"xdg/public/.gitkeep" = "~/public/.gitkeep"
"xdg/templates/.gitkeep" = "~/templates/.gitkeep"
"xdg/videos/.gitkeep" = "~/videos/.gitkeep"

[scripts.files]
"bin/set-monitors" = "~/bin/set-monitors"

# ==================================================================================================================== #
# Shell

[home.files]
"home/.zshenv" = "~/.zshenv"
"home/.profile" = "~/.profile"
"home/.editorconfig" = "~/.editorconfig"

[zsh.files]
"zsh/.zshenv" = "~/.config/zsh/.zshenv"
"zsh/.zshrc" = "~/.config/zsh/.zshrc"
"zsh/.zsh_plugins.txt" = "~/.config/zsh/.zsh_plugins.txt"
"zsh/conf.d/" = "~/.config/zsh/conf.d/"
"zsh/functions/" = "~/.config/zsh/functions/"

# ==================================================================================================================== #
# Prompt

[starship.files]
"starship/starship.toml" = "~/.config/starship.toml"

[lsd.files]
"lsd/config.yml" = "~/.config/lsd/config.yml"
"lsd/colors.yml" = "~/.config/lsd/colors.yml"

# ==================================================================================================================== #
# Version Control

[git.files]
"git" = "~/.config/git"

# ==================================================================================================================== #
# Terminal Emulator

[wezterm.files]
"wezterm/wezterm.lua" = "~/.config/wezterm/wezterm.lua"
"wezterm/stylua.toml" = "~/.config/wezterm/stylua.toml"
"wezterm/config/init.lua" = "~/.config/wezterm/config/init.lua"
"wezterm/config/theme.lua" = "~/.config/wezterm/config/theme.lua"
"wezterm/config/font.lua" = "~/.config/wezterm/config/font.lua"


# ==================================================================================================================== #
# Editor

[nvim.files]
"nvim" = { target = "~/.config/nvim", type = "symbolic" }

# ==================================================================================================================== #
# Applications

[bruno.files]
"bruno/preferences.json" = "~/.config/bruno/preferences.json"

[opencode.files]
"opencode/opencode.jsonc" = "~/.config/opencode/opencode.jsonc"
"opencode/tui.jsonc" = "~/.config/opencode/tui.jsonc"
"opencode/skills" = "~/.config/opencode/skills"

# ==================================================================================================================== #
# Default Variables

[default.variables]
theme = "catppuccin-macchiato"

# Catppuccin Macchiato palette
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
